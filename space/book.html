<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Book of My Totehm</title>
<link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#743169; /* le passé — rouge-violet de la charte */
  --rl:46px;--rw:14px;--band-t:96px;--band-b:96px;
  --perf-d:15px;--perf-g:30px;--perf-corner:22px;
  --g-light:#e0e0e0;--g-mid:#909090;
  --futura:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--g-light);font-family:var(--futura);font-weight:300;font-size:14px;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}

/* perforations — écrire dans le logo (coins pleins) */
#perf{position:fixed;inset:0;z-index:4;pointer-events:none}
#perf::before,#perf::after,#perf i::before,#perf i::after{content:"";position:fixed}
#perf::before{top:calc(var(--perf-d)/-2);left:var(--perf-corner);right:var(--perf-corner);height:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-g) var(--perf-d);background-repeat:repeat-x;background-position:left center}
#perf::after{bottom:calc(var(--perf-d)/-2);left:var(--perf-corner);right:var(--perf-corner);height:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-g) var(--perf-d);background-repeat:repeat-x;background-position:left center}
#perf i::before{top:var(--perf-corner);bottom:var(--perf-corner);left:calc(var(--perf-d)/-2);width:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-d) var(--perf-g);background-repeat:repeat-y;background-position:center top}
#perf i::after{top:var(--perf-corner);bottom:var(--perf-corner);right:calc(var(--perf-d)/-2);width:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-d) var(--perf-g);background-repeat:repeat-y;background-position:center top}

#rail{position:fixed;top:0;bottom:0;left:var(--rl);width:var(--rw);background:rgba(255,255,255,.30);z-index:1}

/* bande haute : T + titre */
#band-t{position:fixed;top:0;left:0;right:0;height:var(--band-t);display:flex;align-items:center;justify-content:center;gap:14px;z-index:3}
#band-t img{height:52px;width:auto}
#band-t .bt-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.14em;color:#fff}

/* liste des chapitres */
#list{position:fixed;left:0;right:0;top:var(--band-t);bottom:var(--band-b);overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:4px 0;z-index:2}
.chap{position:relative;display:flex;align-items:center;min-height:44px}
.chap .meta{position:absolute;left:0;width:calc(var(--rl) + var(--rw) + 10px);display:flex;justify-content:center}
.chap .tglyph{height:20px;width:auto;color:#fff}
.chap .body{margin-left:calc(var(--rl) + var(--rw) + 16px);flex:1;padding-right:44px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.chap .c-title{font-family:'Quantico',sans-serif;font-weight:700;font-size:15px;color:#fff;line-height:1.35}
.chap .c-date{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:2px}
.chap .body:hover .c-title{opacity:.75}

#empty{position:fixed;inset:var(--band-t) 24px var(--band-b);display:none;align-items:center;justify-content:center;text-align:center;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.12em;color:rgba(255,255,255,.65);line-height:1.7}
#empty.show{display:flex}

/* bande basse : la question du passé */
#band-b{position:fixed;bottom:0;left:0;right:0;height:var(--band-b);display:flex;align-items:center;justify-content:center;z-index:3;padding:0 30px;text-align:center}
#band-b .q{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.14em;color:rgba(255,255,255,.7)}

/* lecture d'un chapitre */
#read{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column}
#read.show{display:flex}
#read .r-head{height:var(--band-t);display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0}
#read .r-head .tglyph{height:22px;color:#fff}
#read .r-title{font-family:'Quantico',sans-serif;font-weight:700;font-size:16px;color:#fff}
#read .r-body{flex:1;overflow-y:auto;padding:8px 34px 30px calc(var(--rl) + var(--rw) + 20px);font-family:var(--futura);font-weight:300;font-size:15px;line-height:1.9;color:#f0e6ee;white-space:pre-wrap}
#read .r-close{position:fixed;top:14px;right:16px;z-index:51;font-family:'Quantico',sans-serif;font-size:13px;color:#d8c4d4;background:none;border:none;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}
#read .r-close:hover{color:#fff}
</style>
</head>
<body>

<div id="perf"><i></i></div>
<div id="rail"></div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="Tg" viewBox="0 0 24 24"><path d="M4 5h16M12 5v15" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/></symbol>
</defs></svg>

<div id="band-t">
  <img src="assets/img/T.png" alt="T">
  <div class="bt-title">BOOK OF MY TOTEHM</div>
</div>

<div id="list"></div>
<div id="empty">YOUR FIRST CHAPTER<br>IS BEING WRITTEN<br>BY YOUR HABITS.</div>

<div id="band-b"><div class="q">HOW DID I BECOME WHO I AM TODAY?</div></div>

<div id="read">
  <button class="r-close" id="r-close">Close</button>
  <div class="r-head"><svg class="tglyph" viewBox="0 0 24 24"><use href="#Tg"/></svg><div class="r-title" id="r-title"></div></div>
  <div class="r-body" id="r-body"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb=createClient('https://abujjbkbbiumxrokozph.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFidWpqYmtiYml1bXhyb2tvenBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUyODIsImV4cCI6MjA5MDUzMTI4Mn0.1baPwPzAeT91Re9xj6afBrNso-Ri46fvIIwvATZL2us');
const $=id=>document.getElementById(id);

/* Chapitres fictifs — l'algorithme narratif (brique 2) les remplacera par les vrais */
const MOCK=[
  {title:'The Turn Toward Focus',opened_at:'2026-06-28',body:'Something shifted at the end of June.\n\nFour habits arrived in a single week — deep work every morning, reading every night, a phone-free hour, a walk before thinking. The dominant intention moved from Express to Focus.\n\nThe Totehm stopped scattering. It started aiming.'},
  {title:'The Great Pruning',opened_at:'2026-05-11',body:'Seven habits were removed in May.\n\nNot from weakness — from clarity. What survived: the daily grind, the weekly reset, the morning breath.\n\nA Totehm is also made of what it refuses to carry.'},
  {title:'First Marks',opened_at:'2026-04-02',body:'The first habits were carved here.\n\nWrite every day. Train every other day. Call someone who matters, weekly.\n\nSimple lines. But every identity begins with a first mark on the wall.'}
];

function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function render(chaps){
  const box=$('list');box.innerHTML='';
  if(!chaps.length){$('empty').classList.add('show');return;}
  $('empty').classList.remove('show');
  chaps.forEach(c=>{
    const d=document.createElement('div');d.className='chap';
    const date=(c.opened_at||'').slice(0,10);
    d.innerHTML='<div class="meta"><svg class="tglyph" viewBox="0 0 24 24"><use href="#Tg"/></svg></div>'
      +'<div class="body"><div class="c-title">'+esc(c.title)+'</div><div class="c-date">'+esc(date)+'</div></div>';
    d.querySelector('.body').onclick=()=>{$('r-title').textContent=c.title;$('r-body').textContent=c.body||'';$('read').classList.add('show');};
    box.appendChild(d);
  });
}
$('r-close').onclick=()=>$('read').classList.remove('show');

(async()=>{
  let chaps=[];
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session&&session.user){
      const {data}=await sb.from('book_chapters').select('title,body,opened_at').eq('user_id',session.user.id).order('opened_at',{ascending:false});
      if(data&&data.length)chaps=data;
    }
  }catch(e){}
  render(chaps.length?chaps:MOCK);
})();

/* Retour au centre : swipe droite / molette / Escape -> le parent referme */
function goBack(){
  if($('read').classList.contains('show')){$('read').classList.remove('show');return;}
  const embedded=window.parent&&window.parent!==window;
  if(embedded){try{window.parent.postMessage({type:'totehm-close-book'},'*');return;}catch(e){}}
  window.location.href='index.html';
}
let lock=false;const trig=()=>{if(lock)return;lock=true;setTimeout(()=>lock=false,600);goBack();};
window.addEventListener('wheel',e=>{if(Math.abs(e.deltaX)>30&&e.deltaX<0)trig();},{passive:true});
let x0=0,y0=0,ax=null;
window.addEventListener('touchstart',e=>{x0=e.changedTouches[0].screenX;y0=e.changedTouches[0].screenY;ax=null;},{passive:true});
window.addEventListener('touchmove',e=>{if(ax)return;const dx=Math.abs(e.changedTouches[0].screenX-x0),dy=Math.abs(e.changedTouches[0].screenY-y0);if(dx>12||dy>12)ax=dx>dy?'h':'v';},{passive:true});
window.addEventListener('touchend',e=>{if(ax!=='h')return;const dx=e.changedTouches[0].screenX-x0;if(dx>50)trig();},{passive:true});
window.addEventListener('keydown',e=>{if(e.key==='Escape'||e.key==='ArrowRight')trig();});
</script>
</body>
</html>

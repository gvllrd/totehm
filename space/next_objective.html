<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Next Objective</title>
<link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#36498C; /* le futur — le ciel, la direction */
  --rl:46px;--rw:14px;--band-t:96px;--band-b:96px;
  --perf-d:15px;--perf-g:30px;--perf-corner:22px;
  --g-light:#e0e0e0;
  --fight:#E24B4A;--flow:#BA7517;--enrich:#EF9F27;--love:#639922;--express:#1D9E75;--focus:#378ADD;--celebrate:#7F77DD;
  --futura:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--g-light);font-family:var(--futura);font-weight:300;font-size:14px;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}

#perf{position:fixed;inset:0;z-index:4;pointer-events:none}
#perf::before,#perf::after,#perf i::before,#perf i::after{content:"";position:fixed}
#perf::before{top:calc(var(--perf-d)/-2);left:var(--perf-corner);right:var(--perf-corner);height:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-g) var(--perf-d);background-repeat:repeat-x;background-position:left center}
#perf::after{bottom:calc(var(--perf-d)/-2);left:var(--perf-corner);right:var(--perf-corner);height:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-g) var(--perf-d);background-repeat:repeat-x;background-position:left center}
#perf i::before{top:var(--perf-corner);bottom:var(--perf-corner);left:calc(var(--perf-d)/-2);width:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-d) var(--perf-g);background-repeat:repeat-y;background-position:center top}
#perf i::after{top:var(--perf-corner);bottom:var(--perf-corner);right:calc(var(--perf-d)/-2);width:var(--perf-d);background-image:radial-gradient(circle at center,#000 calc(var(--perf-d)/2 - .5px),transparent calc(var(--perf-d)/2));background-size:var(--perf-d) var(--perf-g);background-repeat:repeat-y;background-position:center top}

#rail{position:fixed;top:0;bottom:0;left:var(--rl);width:var(--rw);background:rgba(255,255,255,.30);z-index:1}

#band-t{position:fixed;top:0;left:0;right:0;height:var(--band-t);display:flex;align-items:center;justify-content:center;gap:14px;z-index:3}
#band-t img{height:52px;width:auto}
#band-t .bt-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.14em;color:#fff}

#mid{position:fixed;left:0;right:0;top:var(--band-t);bottom:var(--band-b);overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px 0;z-index:2}

/* saisie de l'objectif — même langage que la ligne d'ajout du Totehm */
#obj-row{position:relative;display:flex;align-items:center;min-height:44px}
#obj-row .meta{position:absolute;left:0;width:calc(var(--rl) + var(--rw) + 10px);display:flex;justify-content:center;color:#fff}
#obj-row .tglyph{height:20px;width:auto}
#obj-input{margin-left:calc(var(--rl) + var(--rw) + 16px);flex:1;margin-right:34px;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.35);color:#fff;font-family:'Quantico',sans-serif;font-size:15px;padding:6px 2px;outline:none}
#obj-input::placeholder{color:rgba(255,255,255,.45)}
#obj-note{margin-left:calc(var(--rl) + var(--rw) + 16px);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);min-height:14px}

/* propositions — structure exacte d'une ligne du Totehm */
.prop{position:relative;display:flex;align-items:center;min-height:44px}
.prop .meta{position:absolute;left:0;width:calc(var(--rl) + var(--rw) + 10px);display:flex;flex-direction:column;align-items:center;gap:2px}
.prop .tglyph{height:20px;width:auto}
.prop .p-freq{font-family:'Quantico',sans-serif;font-size:9px;color:rgba(255,255,255,.8);text-align:center;line-height:1.1;max-width:66px}
.prop .body{margin-left:calc(var(--rl) + var(--rw) + 16px);flex:1;padding-right:64px}
.prop .p-text{font-family:'Quantico',sans-serif;font-weight:400;font-size:15px;color:#fff;line-height:1.35}
.prop .p-add{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:1px solid rgba(255,255,255,.5);color:#fff;font-family:'Quantico',sans-serif;font-size:13px;line-height:1;padding:5px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.prop .p-add:hover{opacity:.7}
.prop.added .p-add{border-color:transparent;color:rgba(255,255,255,.55);cursor:default}
.prop.added .p-text{opacity:.55}

#band-b{position:fixed;bottom:0;left:0;right:0;height:var(--band-b);display:flex;align-items:center;justify-content:center;z-index:3;padding:0 30px;text-align:center}
#band-b .q{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.14em;color:rgba(255,255,255,.7)}
</style>
</head>
<body>

<div id="perf"><i></i></div>
<div id="rail"></div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="Tg" viewBox="0 0 24 24"><path d="M4 5h16M12 5v15" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/></symbol>
</defs></svg>

<div id="band-t">
  <img src="assets/img/T.png" alt="T">
  <div class="bt-title">NEXT OBJECTIVE</div>
</div>

<div id="mid">
  <div id="obj-row">
    <div class="meta"><svg class="tglyph" viewBox="0 0 24 24"><use href="#Tg"/></svg></div>
    <input id="obj-input" placeholder="I want to..." maxlength="300" autocomplete="off" spellcheck="false">
  </div>
  <div id="obj-note"></div>
  <div id="props"></div>
</div>

<div id="band-b"><div class="q">WHO DO I WANT TO BECOME NEXT?</div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb=createClient('https://abujjbkbbiumxrokozph.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFidWpqYmtiYml1bXhyb2tvenBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUyODIsImV4cCI6MjA5MDUzMTI4Mn0.1baPwPzAeT91Re9xj6afBrNso-Ri46fvIIwvATZL2us');
const $=id=>document.getElementById(id);

const FLABEL={every_minute:'every minute',hourly:'every hour',several_daily:'several times a day',every_morning:'every morning',every_afternoon:'every afternoon',daily:'daily',every_evening:'every evening',every_weekday:'every weekday',every_night:'every night',every_other_day:'every other day',twice_week:'twice a week',every_weekend:'every weekend',weekly:'weekly',every_monday:'every monday',every_tuesday:'every tuesday',every_wednesday:'every wednesday',every_thursday:'every thursday',every_friday:'every friday',every_saturday:'every saturday',every_sunday:'every sunday',biweekly:'every two weeks',twice_month:'twice a month',monthly:'monthly',every_1st_month:'every 1st of the month',every_15th_month:'every 15th of the month',seasonal:'every season change',quarterly:'every quarter',semiannual:'every six months',yearly:'yearly',every_birthday:'every birthday',every_newyear:'every new year',randomly:'randomly',sometimes:'sometimes'};
const ICOLOR={fight:'var(--fight)',flow:'var(--flow)',enrich:'var(--enrich)',love:'var(--love)',express:'var(--express)',focus:'var(--focus)',celebrate:'var(--celebrate)'};

function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function note(t){$('obj-note').textContent=t||'';}

function renderProps(habits){
  const box=$('props');box.innerHTML='';
  habits.forEach(h=>{
    const d=document.createElement('div');d.className='prop';
    d.innerHTML='<div class="meta"><svg class="tglyph" viewBox="0 0 24 24" style="color:'+(ICOLOR[h.i]||'#fff')+'"><use href="#Tg"/></svg><div class="p-freq">'+esc(FLABEL[h.f]||h.f)+'</div></div>'
      +'<div class="body"><div class="p-text">'+esc(h.text)+'</div></div>'
      +'<button class="p-add" aria-label="Add to my Totehm">+</button>';
    d.querySelector('.p-add').onclick=()=>{
      if(d.classList.contains('added'))return;
      const habit={t:h.text,f:h.f,i:h.i};
      const embedded=window.parent&&window.parent!==window;
      let sent=false;
      if(embedded){try{window.parent.postMessage({type:'totehm-add-habit',habit},'*');sent=true;}catch(e){}}
      if(!sent){ /* standalone : écrire directement dans le state local du Totehm */
        try{
          const KEY='totehm_habits_v1';
          const raw=localStorage.getItem(KEY);
          const st=raw?JSON.parse(raw):{habits:[]};
          (st.habits=st.habits||[]).push(habit);
          localStorage.setItem(KEY,JSON.stringify(st));
        }catch(e){}
      }
      d.classList.add('added');
      d.querySelector('.p-add').textContent='in your Totehm';
    };
    box.appendChild(d);
  });
}

let busy=false;
$('obj-input').addEventListener('keydown',async(e)=>{
  if(e.key!=='Enter'||busy)return;
  const v=$('obj-input').value.trim();
  if(v.length<4){note('write your objective first');return;}
  busy=true;note('designing your habits...');$('props').innerHTML='';
  try{
    const {data,error}=await sb.functions.invoke('generate_objective',{body:{objective:v}});
    if(error){note(error.message&&/503|not configured/i.test(error.message)?'generation engine coming online soon':'try again');busy=false;return;}
    const habits=(data&&data.habits)||[];
    if(!habits.length){note('nothing came back — rephrase and try again');busy=false;return;}
    note('accept the habits that feel true');
    renderProps(habits);
  }catch(err){note('try again');}
  busy=false;
});

/* Retour au centre : swipe gauche / Escape -> le parent referme */
function goBack(){
  const embedded=window.parent&&window.parent!==window;
  if(embedded){try{window.parent.postMessage({type:'totehm-close-next'},'*');return;}catch(e){}}
  window.location.href='index.html';
}
let lock=false;const trig=()=>{if(lock)return;lock=true;setTimeout(()=>lock=false,600);goBack();};
let x0=0,y0=0,ax=null;
window.addEventListener('touchstart',e=>{x0=e.changedTouches[0].screenX;y0=e.changedTouches[0].screenY;ax=null;},{passive:true});
window.addEventListener('touchmove',e=>{if(ax)return;const dx=Math.abs(e.changedTouches[0].screenX-x0),dy=Math.abs(e.changedTouches[0].screenY-y0);if(dx>12||dy>12)ax=dx>dy?'h':'v';},{passive:true});
window.addEventListener('touchend',e=>{if(ax!=='h')return;if(e.target&&e.target.closest&&e.target.closest('input,button'))return;const dx=e.changedTouches[0].screenX-x0;if(dx<-50)trig();},{passive:true});
window.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key==='Escape'||e.key==='ArrowLeft')trig();});
</script>
</body>
</html>

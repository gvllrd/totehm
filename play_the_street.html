<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>TOTEHM — Play The Street</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;overflow-x:hidden}
body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

/* ═══════════════════════════ STAGE */
.stage{
  width:100%;aspect-ratio:16/9;
  background:#000;overflow:hidden;flex-shrink:0;
  position:relative;
}
.stage video{width:100%;height:100%;object-fit:cover;display:block}
.stage video[hidden]{display:none}
.stage-idle{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#000;transition:opacity .4s ease;
}
.stage-idle[hidden]{opacity:0;pointer-events:none}
.stage-idle .plus{
  color:#333366;font-size:min(22vw,160px);
  font-weight:300;opacity:.2;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.3;transform:scale(1.06)}}

.cta{
  position:absolute;bottom:14px;right:18px;
  color:#fff;font-size:9px;letter-spacing:.35em;text-transform:uppercase;
  text-decoration:none;opacity:.3;transition:opacity .2s;z-index:10;
}
.cta:hover{opacity:1}

/* ═══════════════════════════ SIGN BUTTON */
.sign{
  background:none;border:0;padding:0;cursor:pointer;
  transition:transform .12s ease,filter .2s ease;
  touch-action:manipulation;outline:none;flex-shrink:0;
}
.sign img{width:100%;height:100%;display:block;object-fit:contain;pointer-events:none}
.sign:hover{filter:brightness(1.15)}
.sign:active{transform:scale(.88)}
.sign[aria-pressed="true"]{
  filter:drop-shadow(0 0 6px rgba(255,255,255,.45)) drop-shadow(0 0 18px #333366);
}

/* ═══════════════════════════ MOBILE: SLIDER */
.slider-wrap{
  flex:1;display:flex;align-items:center;background:#000;
  padding:12px 0;min-height:100px;
}
.slider{
  display:flex;gap:16px;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  padding:8px 24px;
  scrollbar-width:none;
}
.slider::-webkit-scrollbar{display:none}
.slider .sign{
  width:68px;height:68px;min-width:68px;
  scroll-snap-align:center;
}

/* ═══════════════════════════ DESKTOP: CONTROLLER */
.controller{display:none}

@media(min-width:1024px)and(orientation:landscape){
  body{flex-direction:row;height:100vh;height:100dvh;overflow:hidden}
  .stage{flex:1 1 58%;width:auto;height:100%;aspect-ratio:auto}
  .slider-wrap{display:none}
  .controller{
    display:flex;flex:1 1 42%;height:100%;
    align-items:center;justify-content:center;
    background:#000;padding:24px;
  }
  .ctrl{
    position:relative;width:100%;max-width:640px;aspect-ratio:16/10;
  }
  .ctrl .sign{position:absolute}

  /* ═══ CONTROLLER POSITIONS ═══ */

  /* ── TOP ROW: L1/R1 shoulders ── */
  .ctrl .sign[data-id="wrong_way"]  {left:4%;top:0%;width:12%}
  .ctrl .sign[data-id="one_way"]    {right:1%;top:0%;width:18%}

  /* ── SCREEN CENTER: H + P ── */
  .ctrl .sign[data-id="Hotel"]      {left:36%;top:6%;width:11%}
  .ctrl .sign[data-id="parking"]    {left:50%;top:6%;width:9%}

  /* ── T sign above D-pad ── */
  .ctrl .sign[data-id="station"]    {left:23%;top:8%;width:7%}

  /* ── D-PAD (arrows in cross formation) ── */
  .ctrl .sign[data-id="straight"]          {left:13%;top:22%;width:7.5%}
  .ctrl .sign[data-id="left2"]             {left:3%;top:34%;width:7.5%}
  .ctrl .sign[data-id="left_or_straight"]  {left:23%;top:34%;width:7.5%}
  .ctrl .sign[data-id="uturn"]             {left:13%;top:46%;width:7.5%}

  /* ── RIGHT CLUSTER (action buttons △○✕□) ── */
  .ctrl .sign[data-id="stop"]       {right:20%;top:20%;width:9%}
  .ctrl .sign[data-id="no_entry"]   {right:5%;top:25%;width:9%}
  .ctrl .sign[data-id="dead_end"]   {right:20%;top:40%;width:8%}
  .ctrl .sign[data-id="priority"]   {right:5%;top:42%;width:8%}

  /* ── CENTER CROSS (+) ── */
  .ctrl .sign[data-id="pharma"]     {left:28%;top:48%;width:14%}

  /* ── CENTER SMALL ── */
  .ctrl .sign[data-id="single_lane"]{left:44%;top:54%;width:6%}
  .ctrl .sign[data-id="roundabout"] {left:52%;top:44%;width:14%}

  /* ── BOTTOM LEFT: left analog stick ── */
  .ctrl .sign[data-id="no_parking"] {left:2%;top:62%;width:22%}

  /* ── BOTTOM RIGHT: right analog stick ── */
  .ctrl .sign[data-id="obstacles"]  {right:3%;top:55%;width:13%}
  .ctrl .sign[data-id="detour"]     {right:16%;top:68%;width:12%}

  /* ── BOTTOM CENTER ── */
  .ctrl .sign[data-id="Hospital"]   {left:36%;top:72%;width:9%}
}

@media(min-width:1440px){.ctrl{max-width:760px}}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<section class="stage">
  <video id="v" playsinline muted loop preload="none" hidden></video>
  <div class="stage-idle" id="idle"><span class="plus">+</span></div>
  <a class="cta" href="buy.html">Get Higher →</a>
</section>

<!-- MOBILE -->
<div class="slider-wrap"><div class="slider" id="slider"></div></div>

<!-- DESKTOP -->
<div class="controller"><div class="ctrl" id="ctrl"></div></div>

<script>
(()=>{
  const SIGNS=[
    'wrong_way','one_way','station','Hotel','parking',
    'straight','left2','left_or_straight','uturn',
    'stop','no_entry','priority','dead_end',
    'pharma','single_lane','roundabout',
    'no_parking','obstacles','Hospital','detour'
  ];

  const BASE='assets/signs/';

  const VIDEOS={
    // wrong_way:'assets/video/wrong_way.mp4',
    // stop:'assets/video/stop.mp4',
  };

  const video=document.getElementById('v');
  const idle=document.getElementById('idle');
  const slider=document.getElementById('slider');
  const ctrl=document.getElementById('ctrl');
  let current=null;

  function makeBtn(id){
    const btn=document.createElement('button');
    btn.className='sign';
    btn.dataset.id=id;
    btn.setAttribute('aria-label',id.replace(/_/g,' '));
    btn.setAttribute('aria-pressed','false');
    const img=document.createElement('img');
    img.src=BASE+id+'.svg';
    img.alt=id.replace(/_/g,' ');
    img.loading='lazy';
    btn.appendChild(img);
    btn.addEventListener('click',()=>play(btn));
    return btn;
  }

  SIGNS.forEach(id=>{
    slider.appendChild(makeBtn(id));
    ctrl.appendChild(makeBtn(id));
  });

  function play(btn){
    if(current===btn)return;
    const id=btn.dataset.id;
    document.querySelectorAll('.sign').forEach(b=>b.setAttribute('aria-pressed','false'));
    document.querySelectorAll('.sign[data-id="'+id+'"]').forEach(b=>b.setAttribute('aria-pressed','true'));
    current=btn;
    idle.hidden=true;

    const src=VIDEOS[id];
    if(src){
      video.hidden=false;
      if(video.src!==src)video.src=src;
      video.play().catch(()=>{});
    }else{
      video.hidden=true;
      video.removeAttribute('src');
    }
    if(navigator.vibrate)navigator.vibrate(10);
  }

  const KEYS={ArrowUp:'straight',ArrowDown:'uturn',ArrowLeft:'left2',ArrowRight:'left_or_straight'};
  document.addEventListener('keydown',e=>{
    const id=KEYS[e.key];
    if(!id)return;
    e.preventDefault();
    const b=ctrl.querySelector('.sign[data-id="'+id+'"]')||slider.querySelector('.sign[data-id="'+id+'"]');
    if(b)play(b);
  });
})();
</script>

</body>
</html>

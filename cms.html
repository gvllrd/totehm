
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOTEHM — CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Quantico:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050505;--panel:#0a0b0c;--border:#1a1b1e;--coral:#fbd5ca;
  --white:#fff;--gray:#666;--dim:#333;
  --fight:#E24B4A;--flow:#EF9F27;--enrich:#BA7517;--love:#639922;
  --express:#1D9E75;--focus:#378ADD;--celebrate:#7F77DD;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--white);font-family:'Quantico',monospace;overflow-x:hidden}

#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;z-index:999;transition:opacity .4s}
#lock.out{opacity:0;pointer-events:none}
.lock-logo{font-size:48px;font-weight:700;letter-spacing:.3em;color:var(--coral)}
.lock-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--gray);letter-spacing:.2em;text-transform:uppercase}
.lock-form{display:flex;flex-direction:column;align-items:center;gap:12px}
.lock-input{background:var(--panel);border:1px solid var(--border);color:var(--white);font-family:'Space Mono',monospace;font-size:14px;letter-spacing:.15em;padding:12px 24px;text-align:center;outline:none;width:260px;transition:border-color .2s}
.lock-input:focus{border-color:var(--coral)}
.lock-btn{background:transparent;border:1px solid var(--coral);color:var(--coral);font-family:'Quantico',monospace;font-weight:700;font-size:14px;letter-spacing:.12em;padding:10px 32px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.lock-btn:hover{background:var(--coral);color:#000}
.lock-err{font-family:'Space Mono',monospace;font-size:11px;color:var(--fight);letter-spacing:.1em;min-height:16px}
.rb{height:2px;background:linear-gradient(90deg,var(--fight),var(--flow),var(--enrich),var(--love),var(--express),var(--focus),var(--celebrate));width:260px}

#cms{display:none;min-height:100vh}
#cms.show{display:block}

.cms-nav{position:sticky;top:0;z-index:100;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:48px}
.cms-nav-logo{font-size:15px;font-weight:700;letter-spacing:.2em;color:var(--coral)}
.cms-nav-right{display:flex;align-items:center;gap:16px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--gray);display:inline-block;transition:background .3s}
.status-dot.saved{background:var(--love)}
.status-dot.saving{background:var(--flow);animation:pulse .8s infinite}
.status-dot.error{background:var(--fight)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--gray);letter-spacing:.1em}
.save-btn{background:transparent;border:1px solid var(--coral);color:var(--coral);font-family:'Quantico',monospace;font-weight:700;font-size:13px;letter-spacing:.1em;padding:6px 20px;cursor:pointer;transition:all .15s}
.save-btn:hover{background:var(--coral);color:#000}
.save-btn:disabled{opacity:.4;cursor:default}

.cms-body{max-width:1100px;margin:0 auto;padding:40px 28px}
.cms-title{font-family:'Space Mono',monospace;font-size:11px;color:var(--gray);letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px}

.cms-section{border:1px solid var(--border);margin-bottom:16px;background:var(--panel)}
.cms-section-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.cms-section-head:hover{background:#0d0e10}
.cms-section-label{display:flex;align-items:center;gap:10px}
.sec-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--gray);letter-spacing:.15em}
.sec-name{font-size:13px;font-weight:700;color:var(--white);letter-spacing:.06em;text-transform:uppercase}
.sec-arrow{font-size:10px;color:var(--gray);transition:transform .2s}
.cms-section.open .sec-arrow{transform:rotate(180deg)}
.cms-section-body{display:none;padding:20px 18px}
.cms-section.open .cms-section-body{display:block}

.field{margin-bottom:18px}
.field:last-child{margin-bottom:0}
.field-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--gray);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
.field-input,.field-textarea{width:100%;background:#000;border:1px solid var(--dim);color:var(--white);font-family:'Quantico',monospace;font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s;resize:vertical}
.field-input:focus,.field-textarea:focus{border-color:var(--coral)}
.field-textarea{min-height:90px;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── STYLE EDITOR ── */
.style-tabs{display:flex;gap:1px;margin-bottom:16px;background:var(--border)}
.style-tab{flex:1;padding:9px;text-align:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);cursor:pointer;background:var(--panel);transition:all .15s}
.style-tab.active{color:var(--coral);background:#000}

.color-picker-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.cp-item{display:flex;flex-direction:column;gap:5px}
.cp-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--gray);letter-spacing:.12em;text-transform:uppercase}
.cp-row{display:flex;align-items:center;gap:8px}
.cp-swatch{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.cp-swatch input[type=color]{position:absolute;inset:-4px;width:calc(100%+8px);height:calc(100%+8px);opacity:0;cursor:pointer}
.cp-hex{flex:1;background:#000;border:1px solid var(--dim);color:var(--white);font-family:'Space Mono',monospace;font-size:11px;padding:6px 8px;outline:none;transition:border-color .15s}
.cp-hex:focus{border-color:var(--coral)}

.section-toggles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.sec-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);background:#000}
.sec-toggle-name{font-size:12px;font-weight:700;letter-spacing:.06em}
.toggle-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--dim);border-radius:10px;cursor:pointer;transition:background .2s}
.toggle-switch input:checked+.toggle-slider{background:var(--love)}
.toggle-slider::after{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch input:checked+.toggle-slider::after{transform:translateX(16px)}

.preview-btn{width:100%;background:transparent;border:1px solid var(--dim);color:var(--gray);font-family:'Quantico',monospace;font-size:12px;letter-spacing:.1em;padding:9px;cursor:pointer;transition:all .15s;text-transform:uppercase;margin-top:8px}
.preview-btn:hover{border-color:var(--coral);color:var(--coral)}

.slider-row{display:grid;grid-template-columns:1fr 80px;gap:12px;align-items:center;margin-bottom:12px}
.slider-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--gray);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--coral)}

/* Rules list */
.rules-list{display:flex;flex-direction:column;gap:8px}
.rule-item{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start}
.rule-n{font-family:'Space Mono',monospace;font-size:9px;color:var(--fight);padding-top:12px}

/* Intentions */
.intentions-list{display:flex;flex-direction:column;gap:10px}
.intention-item{display:grid;grid-template-columns:8px 110px 1fr 1fr;gap:10px;align-items:center}

/* Build table */
.build-table{width:100%;border-collapse:collapse}
.build-table th{font-family:'Space Mono',monospace;font-size:9px;color:var(--gray);letter-spacing:.12em;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);background:#000}
.build-table td{padding:8px 10px;border-bottom:1px solid var(--dim);vertical-align:top}
.build-table tr:last-child td{border-bottom:none}
.build-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--coral)}

.toast{position:fixed;bottom:28px;right:28px;background:var(--panel);border:1px solid var(--border);padding:12px 20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--white);letter-spacing:.08em;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:none}
.toast.ok{border-color:var(--love);color:var(--love)}
.toast.err{border-color:var(--fight);color:var(--fight)}
.loading{text-align:center;padding:80px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gray);letter-spacing:.2em}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-logo">TOTEHM</div>
  <div class="rb"></div>
  <div class="lock-sub">Context File — Accès privé</div>
  <div class="lock-form">
    <input type="password" class="lock-input" id="pwd" placeholder="MOT DE PASSE"
      onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="lock-btn" onclick="tryLogin()">Entrer</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<div id="cms">
  <nav class="cms-nav">
    <div class="cms-nav-logo">TOTEHM · CMS</div>
    <div class="cms-nav-right">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-label" id="status-label">—</span>
      <button class="save-btn" id="save-btn" onclick="saveAll()">Sauvegarder</button>
    </div>
  </nav>
  <div class="cms-body">
    <div class="cms-title">Context File v6b — Référence absolue · Édition en direct</div>
    <div id="cms-content"><div class="loading">Chargement···</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://abujjbkbbiumxrokozph.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFidWpqYmtiYml1bXhyb2tvenBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUyODIsImV4cCI6MjA5MDUzMTI4Mn0.1baPwPzAeT91Re9xj6afBrNso-Ri46fvIIwvATZL2us';
const PASSWORD='wahigher2025';
const LANDING_URL='https://gvllrd.github.io/totehm/index.html';

const DEFAULT_STYLE={
  bg:'#111213',panel:'#0a0b0c',coral:'#fbd5ca',border:'#222426',
  gray:'#999',dim:'#666',faint:'#333',
  fight:'#E24B4A',flow:'#EF9F27',enrich:'#BA7517',love:'#639922',
  express:'#1D9E75',focus:'#378ADD',celebrate:'#7F77DD',
  font_size_base:'15.69',font_size_title:'47.08',map_margin:'104',
  sections_visible:{hero:true,loop:true,figher_club:true,castes:true,process:true,footer:true}
};

let data={};
let styleConfig=JSON.parse(JSON.stringify(DEFAULT_STYLE));
let activeStyleTab='colors';

// ── AUTH ──
function tryLogin(){
  if(document.getElementById('pwd').value===PASSWORD){
    document.getElementById('lock').classList.add('out');
    setTimeout(()=>{
      document.getElementById('lock').style.display='none';
      document.getElementById('cms').classList.add('show');
      loadAll();
    },400);
  } else {
    document.getElementById('lock-err').textContent='Mot de passe incorrect.';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

// ── SUPABASE ──
async function sbFetch(path,opts={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...opts.headers},
    ...opts
  });
  if(res.status===204||res.status===404)return null;
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function loadAll(){
  setStatus('saving','Chargement···');
  try{
    const [cmsRows,styleRows]=await Promise.all([
      sbFetch('cms_content?id=eq.context_v6b&select=content'),
      sbFetch('style_config?id=eq.main&select=config')
    ]);
    if(cmsRows&&cmsRows.length>0) data=JSON.parse(cmsRows[0].content);
    if(styleRows&&styleRows.length>0) styleConfig={...DEFAULT_STYLE,...styleRows[0].config};
    setStatus('saved','Synchronisé');
    renderCMS();
  } catch(e){
    setStatus('error','Erreur chargement');
    renderCMS();
  }
}

async function saveAll(){
  collectData();
  setStatus('saving','Sauvegarde···');
  document.getElementById('save-btn').disabled=true;
  try{
    // Save content
    const existsCMS=await sbFetch('cms_content?id=eq.context_v6b&select=id');
    if(existsCMS&&existsCMS.length>0){
      await sbFetch('cms_content?id=eq.context_v6b',{method:'PATCH',body:JSON.stringify({content:JSON.stringify(data),updated_at:new Date().toISOString()})});
    } else {
      await sbFetch('cms_content',{method:'POST',body:JSON.stringify({id:'context_v6b',content:JSON.stringify(data)})});
    }
    // Save style — direct PATCH sans vérification préalable
    await fetch(SUPABASE_URL+'/rest/v1/style_config?id=eq.main',{
      method:'PATCH',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=representation'
      },
      body:JSON.stringify({config:styleConfig,updated_at:new Date().toISOString()})
    });
    setStatus('saved','Sauvegardé ✓');
    showToast('Sauvegardé ✓ bg='+styleConfig.bg,'ok');
  } catch(e){
    setStatus('error','Erreur save');
    showToast('Erreur : '+e.message,'err');
  }
  document.getElementById('save-btn').disabled=false;
}

// ── STATUS / TOAST ──
function setStatus(type,label){
  document.getElementById('status-dot').className='status-dot '+type;
  document.getElementById('status-label').textContent=label;
}
let toastTimer;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='toast',4000);
}

// ── RENDER CMS ──
function renderCMS(){
  const c=document.getElementById('cms-content');
  c.innerHTML=`
    ${renderSection('01','Méta',renderMeta())}
    ${renderSection('02','Vision & Copywriting',renderVision())}
    ${renderSection('03','Règles absolues',renderRegles(),true)}
    ${renderSection('04','7 Intentions',renderIntentions(),true)}
    ${renderSection('05','Castes & Abonnements',renderCastes())}
    ${renderSection('06','Stack technique',renderStack())}
    ${renderSection('07','Ordre de build',renderBuild())}
    ${renderSection('08','Style · Landing Page',renderStyle(),false,'var(--focus)')}
  `;
  document.querySelectorAll('.cms-section-head').forEach(h=>{
    h.addEventListener('click',()=>h.closest('.cms-section').classList.toggle('open'));
  });
  document.querySelector('.cms-section').classList.add('open');
  bindStyleTabs();
}

function renderSection(n,name,body,open=false,accentColor=''){
  const accent=accentColor?`border-top:2px solid ${accentColor};`:'';
  return `
    <div class="cms-section${open?' open':''}" style="${accent}">
      <div class="cms-section-head">
        <div class="cms-section-label">
          <span class="sec-num">${n}</span>
          <span class="sec-name">${name}</span>
        </div>
        <span class="sec-arrow">▾</span>
      </div>
      <div class="cms-section-body">${body}</div>
    </div>`;
}

// ── STYLE SECTION ──
function renderStyle(){
  const s=styleConfig;
  const sv=s.sections_visible||{};
  return `
    <div class="style-tabs" id="style-tabs">
      <div class="style-tab ${activeStyleTab==='colors'?'active':''}" data-tab="colors">Couleurs</div>
      <div class="style-tab ${activeStyleTab==='intentions'?'active':''}" data-tab="intentions">Intentions</div>
      <div class="style-tab ${activeStyleTab==='typo'?'active':''}" data-tab="typo">Typographie</div>
      <div class="style-tab ${activeStyleTab==='sections'?'active':''}" data-tab="sections">Sections</div>
    </div>

    <div id="style-tab-colors" class="style-tab-content" style="display:${activeStyleTab==='colors'?'block':'none'}">
      <div class="field-label" style="margin-bottom:12px">Couleurs globales</div>
      <div class="color-picker-row">
        ${cp('bg','Background',s.bg)}
        ${cp('panel','Panel',s.panel)}
        ${cp('coral','Coral (boutons)',s.coral)}
        ${cp('border','Border',s.border)}
        ${cp('gray','Gray (textes)',s.gray)}
        ${cp('dim','Dim (subtitles)',s.dim)}
        ${cp('faint','Faint (hints)',s.faint)}
      </div>
      <button class="preview-btn" onclick="openPreview()">Prévisualiser la landing →</button>
    </div>

    <div id="style-tab-intentions" class="style-tab-content" style="display:${activeStyleTab==='intentions'?'block':'none'}">
      <div class="field-label" style="margin-bottom:12px">Couleurs des 7 intentions</div>
      <div class="color-picker-row">
        ${cp('fight','Fight',s.fight)}
        ${cp('flow','Flow',s.flow)}
        ${cp('enrich','Enrich',s.enrich)}
        ${cp('love','Love',s.love)}
        ${cp('express','Express',s.express)}
        ${cp('focus','Focus',s.focus)}
        ${cp('celebrate','Celebrate',s.celebrate)}
      </div>
      <button class="preview-btn" onclick="openPreview()">Prévisualiser la landing →</button>
    </div>

    <div id="style-tab-typo" class="style-tab-content" style="display:${activeStyleTab==='typo'?'block':'none'}">
      <div class="field-label" style="margin-bottom:12px">Tailles de police</div>
      <div class="slider-row">
        <div>
          <div class="slider-label">Texte courant</div>
          <input type="range" min="12" max="20" step="0.5"
            value="${s.font_size_base}"
            oninput="document.getElementById('val-base').textContent=this.value+'px';styleConfig.font_size_base=this.value"
            style="width:100%">
        </div>
        <input class="field-input" id="val-base" value="${s.font_size_base}px" style="text-align:center;padding:6px" readonly>
      </div>
      <div class="slider-row">
        <div>
          <div class="slider-label">Titre principal (hero)</div>
          <input type="range" min="28" max="72" step="1"
            value="${s.font_size_title}"
            oninput="document.getElementById('val-title').textContent=this.value+'px';styleConfig.font_size_title=this.value"
            style="width:100%">
        </div>
        <input class="field-input" id="val-title" value="${s.font_size_title}px" style="text-align:center;padding:6px" readonly>
      </div>
      <div class="slider-row">
        <div>
          <div class="slider-label">Marge MAP (desktop)</div>
          <input type="range" min="0" max="200" step="4"
            value="${s.map_margin}"
            oninput="document.getElementById('val-map').textContent=this.value+'px';styleConfig.map_margin=this.value"
            style="width:100%">
        </div>
        <input class="field-input" id="val-map" value="${s.map_margin}px" style="text-align:center;padding:6px" readonly>
      </div>
      <button class="preview-btn" onclick="openPreview()">Prévisualiser la landing →</button>
    </div>

    <div id="style-tab-sections" class="style-tab-content" style="display:${activeStyleTab==='sections'?'block':'none'}">
      <div class="field-label" style="margin-bottom:12px">Sections visibles sur la landing</div>
      <div class="section-toggles">
        ${secToggle('hero','Hero · MAP',sv.hero)}
        ${secToggle('loop','The Loop',sv.loop)}
        ${secToggle('figher_club','Figher Club',sv.figher_club)}
        ${secToggle('castes','Castes',sv.castes)}
        ${secToggle('process','Process',sv.process)}
        ${secToggle('footer','Footer',sv.footer)}
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--gray);padding:10px;border:1px solid var(--border);background:#000">
        Les sections désactivées sont masquées (display:none) sur la landing au prochain rechargement.
      </div>
    </div>
  `;
}

function cp(key,label,val){
  return `
    <div class="cp-item">
      <div class="cp-label">${label}</div>
      <div class="cp-row">
        <div class="cp-swatch" style="background:${val}">
          <input type="color" value="${val}"
            oninput="this.parentElement.style.background=this.value;this.nextElementSibling.value=this.value;styleConfig['${key}']=this.value">
        </div>
        <input class="cp-hex" value="${val}" maxlength="7"
          oninput="if(this.value.match(/^#[0-9a-fA-F]{6}$/)){this.previousElementSibling.querySelector('input').value=this.value;this.previousElementSibling.style.background=this.value;styleConfig['${key}']=this.value}">
      </div>
    </div>`;
}

function secToggle(key,label,val){
  return `
    <div class="sec-toggle">
      <span class="sec-toggle-name">${label}</span>
      <label class="toggle-switch">
        <input type="checkbox" ${val?'checked':''} data-section="${key}"
          onchange="styleConfig.sections_visible['${key}']=this.checked">
        <span class="toggle-slider"></span>
      </label>
    </div>`;
}

function bindStyleTabs(){
  document.querySelectorAll('.style-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      activeStyleTab=tab.dataset.tab;
      document.querySelectorAll('.style-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.style-tab-content').forEach(c=>c.style.display='none');
      document.getElementById('style-tab-'+activeStyleTab).style.display='block';
    });
  });
}

function openPreview(){
  showToast('Sauvegarde avant prévisualisation···','ok');
  saveAll().then(()=>window.open(LANDING_URL,'_blank'));
}

// ── COLLECT STYLE ──
function collectStyle(){
  // Already updated live via oninput handlers
}

// ── CONTENT SECTIONS ──
function renderMeta(){
  const m=data.meta||{};
  return `
    <div class="field-row">
      <div class="field"><div class="field-label">Version</div>
        <input class="field-input" data-key="meta.version" value="${esc(m.version||'')}"></div>
      <div class="field"><div class="field-label">Fondateur</div>
        <input class="field-input" data-key="meta.fondateur" value="${esc(m.fondateur||'')}"></div>
    </div>
    <div class="field-row">
      <div class="field"><div class="field-label">MVP City</div>
        <input class="field-input" data-key="meta.mvp" value="${esc(m.mvp||'')}"></div>
      <div class="field"><div class="field-label">Domaine</div>
        <input class="field-input" data-key="meta.domaine" value="${esc(m.domaine||'')}"></div>
    </div>
    <div class="field"><div class="field-label">Stack</div>
      <input class="field-input" data-key="meta.stack" value="${esc(m.stack||'')}"></div>`;
}

function renderVision(){
  const v=data.vision||{};
  return `
    <div class="field"><div class="field-label">Promesse</div>
      <textarea class="field-textarea" data-key="vision.promesse" style="min-height:120px">${esc(v.promesse||'')}</textarea></div>
    <div class="field"><div class="field-label">Problème (Répulsion)</div>
      <textarea class="field-textarea" data-key="vision.probleme">${esc(v.probleme||'')}</textarea></div>
    <div class="field"><div class="field-label">Solution (Objectif)</div>
      <textarea class="field-textarea" data-key="vision.solution">${esc(v.solution||'')}</textarea></div>`;
}

function renderRegles(){
  return `<div class="rules-list">
    ${(data.regles||[]).map((r,i)=>`
      <div class="rule-item">
        <div class="rule-n">${String(i+1).padStart(2,'0')}</div>
        <textarea class="field-textarea" data-key="regles.${i}" style="min-height:52px">${esc(r)}</textarea>
      </div>`).join('')}
  </div>`;
}

function renderIntentions(){
  return `<div class="intentions-list">
    ${(data.intentions||[]).map((it,i)=>`
      <div class="intention-item">
        <div style="width:8px;height:8px;border-radius:50%;background:${it.color};flex-shrink:0"></div>
        <input class="field-input" data-key="intentions.${i}.name" value="${esc(it.name)}" style="font-weight:700;color:${it.color}">
        <input class="field-input" data-key="intentions.${i}.desc" value="${esc(it.desc)}" placeholder="Description">
        <input class="field-input" data-key="intentions.${i}.note" value="${esc(it.note||'')}" placeholder="Note" style="color:var(--gray)">
      </div>`).join('')}
  </div>`;
}

function renderCastes(){
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    ${(data.castes||[]).map((c,i)=>`
      <div style="border:1px solid var(--border);padding:16px;background:#000">
        <div class="field"><div class="field-label">Nom</div>
          <input class="field-input" data-key="castes.${i}.name" value="${esc(c.name||'')}"></div>
        <div class="field"><div class="field-label">Target (profil)</div>
          <input class="field-input" data-key="castes.${i}.target" value="${esc(c.target||'')}" style="color:var(--coral)"></div>
        <div class="field"><div class="field-label">Description target</div>
          <textarea class="field-textarea" data-key="castes.${i}.target_desc" style="min-height:52px">${esc(c.target_desc||'')}</textarea></div>
        <div class="field-row">
          <div class="field"><div class="field-label">Prix</div>
            <input class="field-input" data-key="castes.${i}.prix" value="${esc(c.prix||'')}"></div>
          <div class="field"><div class="field-label">Billing</div>
            <input class="field-input" data-key="castes.${i}.type" value="${esc(c.type||'')}"></div>
        </div>
        <div class="field"><div class="field-label">Features</div>
          <textarea class="field-textarea" data-key="castes.${i}.desc" style="min-height:60px">${esc(c.desc||'')}</textarea></div>
      </div>`).join('')}
  </div>`;
}

function renderStack(){
  return `<div style="display:flex;flex-direction:column;gap:8px">
    ${(data.stack||[]).map((s,i)=>`
      <div style="display:grid;grid-template-columns:140px 1fr 100px;gap:10px;align-items:center">
        <input class="field-input" data-key="stack.${i}.name" value="${esc(s.name)}" style="font-weight:700;color:var(--coral)">
        <input class="field-input" data-key="stack.${i}.desc" value="${esc(s.desc)}">
        <input class="field-input" data-key="stack.${i}.cost" value="${esc(s.cost)}" style="color:var(--love);text-align:center">
      </div>`).join('')}
  </div>`;
}

function renderBuild(){
  return `<table class="build-table">
    <thead><tr><th>#</th><th>Brique</th><th>Description</th><th>Validation</th></tr></thead>
    <tbody>
      ${(data.build||[]).map((b,i)=>`
        <tr>
          <td><span class="build-n">${b.n}</span></td>
          <td><input class="field-input" data-key="build.${i}.brique" value="${esc(b.brique)}" style="font-weight:700"></td>
          <td><textarea class="field-textarea" data-key="build.${i}.desc" style="min-height:52px">${esc(b.desc)}</textarea></td>
          <td><input class="field-input" data-key="build.${i}.valid" value="${esc(b.valid)}" style="color:var(--love)"></td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function collectData(){
  document.querySelectorAll('[data-key]').forEach(el=>{
    const keys=el.dataset.key.split('.');
    let obj=data;
    for(let i=0;i<keys.length-1;i++){
      if(obj[keys[i]]===undefined)obj[keys[i]]={};
      obj=obj[keys[i]];
    }
    obj[keys[keys.length-1]]=el.value;
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){
    e.preventDefault();
    if(document.getElementById('cms').classList.contains('show'))saveAll();
  }
});
</script>
</body>
</html>

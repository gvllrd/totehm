<style>
:root {
  --bg: #050505;
  --panel: #0a0b0c;
  --border: #1a1b1e;
  --coral: #fbd5ca;

  --focus: #378ADD;

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Quantico', monospace;
  overflow-x: hidden;
}

/* ── LOCK SCREEN ── */
#lock {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px; z-index: 999;
  transition: opacity .4s;
}
#lock.out { opacity: 0; pointer-events: none; }
.lock-logo {
  font-size: 48px; font-weight: 700;
  letter-spacing: .3em; color: var(--coral);
}
.lock-sub {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--gray);
  letter-spacing: .2em; text-transform: uppercase;
}
.lock-form {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
.lock-input {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Space Mono', monospace;
  font-size: 14px; letter-spacing: .15em;
  padding: 12px 24px; text-align: center;
  outline: none; width: 260px;
  transition: border-color .2s;
}
.lock-input:focus { border-color: var(--coral); }
.lock-btn {
  background: transparent;
  border: 1px solid var(--coral);
  color: var(--coral);
  font-family: 'Quantico', monospace;
  font-weight: 700; font-size: 14px;
  letter-spacing: .12em; padding: 10px 32px;
  cursor: pointer; transition: all .15s;
  text-transform: uppercase;
}
.lock-btn:hover { background: var(--coral); color: #000; }
.lock-err {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--fight);
  letter-spacing: .1em; min-height: 16px;
}
.rb {
  height: 2px;
  background: linear-gradient(90deg,
    var(--fight), var(--flow), var(--enrich),
    var(--love), var(--express), var(--focus), var(--celebrate));
  width: 260px;
}

/* ── CMS ── */
#cms { display: none; min-height: 100vh; }
#cms.show { display: block; }

/* Nav */

  position: sticky; top: 0; z-index: 100;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 28px; height: 48px;
}
.cms-nav-logo {
  font-size: 15px; font-weight: 700;
  letter-spacing: .2em; color: var(--coral);
}
.cms-nav-right {
  display: flex; align-items: center; gap: 16px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gray); display: inline-block;
  transition: background .3s;
}
.status-dot.saved { background: var(--love); }
.status-dot.saving { background: var(--flow); animation: pulse .8s infinite; }
.status-dot.error { background: var(--fight); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.status-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--gray);
  letter-spacing: .1em;

.save-btn {
  background: transparent;
  border: 1px solid var(--coral);
  color: var(--coral);
  font-family: 'Quantico', monospace;
  font-weight: 700; font-size: 13px;

.save-btn:hover { background: var(--coral); color: #000; }
.save-btn:disabled { opacity: .4; cursor: default; }

/* Content */

.cms-title {

.field { margin-bottom: 18px; }
.field:last-child { margin-bottom: 0; }
.field-label {

.field-input:focus, .field-textarea:focus {

.field-textarea { min-height: 90px; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Color grid */
.color-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.color-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.color-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border);
}
.color-name {
  font-family: 'Space Mono', monospace;
  font-size: 8px; color: var(--gray);
  text-align: center;

/* Rules list */
.rules-list { display: flex; flex-direction: column; gap: 8px; }
.rule-item {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 10px; align-items: start;
}
.rule-n {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--fight);
  padding-top: 12px;
}

/* Intentions */
.intentions-list { display: flex; flex-direction: column; gap: 10px; }
.intention-item {
  display: grid;
  grid-template-columns: 8px 110px 1fr 1fr;
  gap: 10px; align-items: center;
}
.int-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* Build order table */
.build-table { width: 100%; border-collapse: collapse; }
.build-table th {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--gray);
  letter-spacing: .12em; text-transform: uppercase;
  padding: 8px 10px; text-align: left;
  border-bottom: 1px solid var(--border);
  background: #000;
}
.build-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--dim);
  vertical-align: top;
}
.build-table tr:last-child td { border-bottom: none; }
.build-n {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--coral);
}

/* Toast */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 12px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--white);
  letter-spacing: .08em;
  opacity: 0; transform: translateY(10px);
  transition: all .25s; pointer-events: none;

}
.toast.show { opacity: 1; transform: none; }
.toast.ok { border-color: var(--love); color: var(--love); }
.toast.err { border-color: var(--fight); color: var(--fight); }

/* Loading */
.loading {
  text-align: center; padding: 80px;
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--gray);
  letter-spacing: .2em;
}
</style>

// ── SUPABASE ──
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok && res.status !== 404) throw new Error(await res.text());
  if (res.status === 204 || res.status === 404) return null;
  return res.json();
}

async function loadFromSupabase() {
  setStatus('saving', 'Chargement···');
  try {
    const rows = await sbFetch('cms_content?id=eq.context_v6b&select=content');
    if (rows && rows.length > 0) {
      data = JSON.parse(rows[0].content);
    }
    setStatus('saved', 'Synchronisé');
    renderCMS();
  } catch(e) {
    setStatus('error', 'Erreur chargement');
    renderCMS(); // fallback sur DEFAULT_DATA
  }
}

async function saveAll() {
  collectData();
  setStatus('saving', 'Sauvegarde···');
  document.getElementById('save-btn').disabled = true;
  try {
    const existing = await sbFetch('cms_content?id=eq.context_v6b&select=id');
    const payload = { id: 'context_v6b', content: JSON.stringify(data), updated_at: new Date().toISOString() };
    if (existing && existing.length > 0) {
      await sbFetch('cms_content?id=eq.context_v6b', {
        method: 'PATCH',
        body: JSON.stringify({ content: payload.content, updated_at: payload.updated_at })
      });
    } else {
      await sbFetch('cms_content', { method: 'POST', body: JSON.stringify(payload) });
    }
    setStatus('saved', 'Sauvegardé ✓');
    showToast('Sauvegardé avec succès', 'ok');
  } catch(e) {
    setStatus('error', 'Erreur save');
    showToast('Erreur : ' + e.message, 'err');
  }
  document.getElementById('save-btn').disabled = false;
}

}

  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

}

// ── COLLECT ──
function collectData() {
  document.querySelectorAll('[data-key]').forEach(el => {
    const keys = el.dataset.key.split('.');
    let obj = data;
    for (let i = 0; i < keys.length - 1; i++) {
      if (obj[keys[i]] === undefined) obj[keys[i]] = {};
      obj = obj[keys[i]];
    }
    obj[keys[keys.length - 1]] = el.value;
  });
}

// ── UTILS ──
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Auto-save on Ctrl+S
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('cms').classList.contains('show')) saveAll();
  }
});
